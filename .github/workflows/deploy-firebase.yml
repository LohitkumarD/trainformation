name: Deploy Firestore Rules & Indexes

on:
  workflow_dispatch:   # trigger manually from GitHub Actions UI
  push:
    branches: [main]
    paths:
      - 'coach-position/firestore.rules'
      - 'coach-position/firestore.indexes.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccount.json

      - name: Deploy Firestore rules and indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ../serviceAccount.json
        run: firebase deploy --only firestore --project coachposition
        working-directory: coach-position

      - name: Cleanup
        if: always()
        run: rm -f serviceAccount.json
