name: Import Trains → Firestore

on:
  workflow_dispatch:   # trigger manually from GitHub Actions UI

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install firebase-admin
        working-directory: scripts

      - name: Write service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > scripts/serviceAccount.json

      - name: Run train import
        env:
          FIREBASE_SA: ./scripts/serviceAccount.json
        run: node scripts/import-trains.js scripts/data/trains.csv

      - name: Cleanup
        if: always()
        run: rm -f scripts/serviceAccount.json
