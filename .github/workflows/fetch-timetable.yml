name: Fetch Train Timetable → Firestore

on:
  workflow_dispatch:   # manual trigger from GitHub Actions UI
  schedule:
    # Run 4× per day (every 6 h) so trains at all departure times are captured
    - cron: '0 0 * * *'   # 00:00 UTC  = 05:30 IST
    - cron: '0 6 * * *'   # 06:00 UTC  = 11:30 IST
    - cron: '0 12 * * *'  # 12:00 UTC  = 17:30 IST
    - cron: '0 18 * * *'  # 18:00 UTC  = 23:30 IST

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install node-fetch firebase-admin
        working-directory: scripts

      - name: Write service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > scripts/serviceAccount.json

      - name: Run timetable fetch
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIREBASE_SA: ./scripts/serviceAccount.json
        run: node scripts/fetch-timetable.js

      - name: Cleanup
        if: always()
        run: rm -f scripts/serviceAccount.json
