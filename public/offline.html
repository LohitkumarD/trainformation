<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Coach Position Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }
    .container { max-width: 320px; }
    .icon {
      width: 80px; height: 80px;
      background: #EFF6FF;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #64748B; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #2563EB; color: white; border: none;
      padding: 0.75rem 2rem; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.9; transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4"/>
        <path d="M18 2h4v4"/>
        <path d="m14 10 8-8"/>
        <path d="M8 10H4"/>
        <path d="M8 14H4"/>
        <path d="M8 18H4"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Your saved train data is still available in the app.</p>
    <button onclick="window.location.href='/'">Open App</button>
  </div>
</body>
</html>
